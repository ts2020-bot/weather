<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>岡山市 天気比較</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; }
    header { background: #2c3e50; color: white; padding: 1.5rem; text-align: center; font-size: 1.5rem; font-weight: bold; }
    .tabs { display: flex; background: white; padding: 0.5rem; gap: 0.5rem; justify-content: center; }
    .tab { padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 20px; transition: all 0.3s; }
    .tab.active { background: #3498db; color: white; }
    .content { padding: 1rem; display: grid; gap: 1rem; max-width: 600px; margin: 0 auto; }
    .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; }
    .card-info { flex: 1; }
    .card h3 { margin: 0 0 0.5rem 0; color: #7f8c8d; font-size: 0.9rem; }
    .card .temp { font-size: 1.5rem; font-weight: bold; }
    .icon { font-size: 3rem; margin-left: 1rem; }
    .footer { text-align: center; font-size: 0.7rem; color: #888; padding: 2rem; }
    .search-area { display: flex; justify-content: center; padding: 1rem; background: white; border-bottom: 1px solid #eee; gap: 0.5rem; }
    .search-area input { flex-grow: 1; max-width: 400px; padding: 0.8rem; border: 1px solid #ddd; border-radius: 20px; font-size: 1rem; }
    .search-area button { padding: 0.8rem 1.5rem; background: #28a745; color: white; border: none; border-radius: 20px; cursor: pointer; transition: background 0.3s; }
    .search-area button:hover { background: #218838; }
  </style>
</head>
<body>
  <header>岡山市 天気比較</header>
  <div class="search-area">
    <input type="text" id="addressInput" placeholder="住所を入力してください（例: 東京都渋谷区）" />
    <button id="searchButton">検索</button>
  </div>
  <div class="tabs">
    <div class="tab active" data-period="today">今日</div>
    <div class="tab" data-period="tomorrow">明日</div>
    <div class="tab" data-period="week">週間</div>
  </div>
  <div id="content" class="content">読み込み中...</div>
  <div class="footer">Powered by OpenWeather & WeatherAPI</div>
  <script>
    const OPENWEATHER_KEY = "789f321d8b6cf36d45ac0ae811715656";
    const WEATHERAPI_KEY = "bbeada1be39e4803adc140054251410";
    let currentLat = 34.655; let currentLon = 133.919; let currentCity = "Okayama";

    function getWeatherIcon(desc) {
      if (desc.includes("雷")) return "⛈️";
      if (desc.includes("雨")) return "🌧️";
      if (desc.includes("晴") && desc.includes("曇")) return "⛅";
      if (desc.includes("晴")) return "☀️";
      if (desc.includes("曇")) return "☁️";
      return "🌤️";
    }

    const tabs = document.querySelectorAll(".tab");
    const content = document.getElementById("content");
    const addressInput = document.getElementById("addressInput");
    const searchButton = document.getElementById("searchButton");

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        loadWeather(tab.dataset.period, currentLat, currentLon, currentCity);
      });
    });

    searchButton.addEventListener("click", async () => {
      const inputAddress = addressInput.value.trim();
      if (inputAddress) {
        // ここにジオコーディングAPI呼び出しロジックを追加し、currentLat/Lon/Cityを更新する
        // 今は仮で入力があれば都市名を更新するだけにとどめる
        currentCity = inputAddress; // 仮に都市名として扱う
        await loadWeather("today", currentLat, currentLon, currentCity);
        tabs.forEach(t => t.classList.remove("active"));
        document.querySelector(".tab[data-period='today']").classList.add("active");
      } else {
        alert("住所を入力してください。");
      }
    });

    async function loadWeather(period, lat, lon, city) {
      content.textContent = "読み込み中...";
      try {
        const [openRes, weatherapiRes] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${OPENWEATHER_KEY}&units=metric&lang=ja`),
          fetch(`https://api.weatherapi.com/v1/forecast.json?key=${WEATHERAPI_KEY}&q=${city}&days=7&lang=ja`)
         ]);
        const openData = await openRes.json();
        const weatherapiData = await weatherapiRes.json();
        if (period === "week") renderWeek(openData, weatherapiData);
        else renderTodayTomorrow(openData, weatherapiData, period);
      } catch (e) { content.innerHTML = `<p style="color:red; text-align:center;">データ取得に失敗しました。</p>`; }
    }

    function renderTodayTomorrow(open, weatherapi, period) {
      const targetDay = period === "today" ? 0 : 1;
      const ow = open.list[targetDay * 8];
      const wa = weatherapi.forecast.forecastday[targetDay];
      content.innerHTML = `
        <div class="card">
          <div class="card-info">
            <h3>OpenWeather</h3>
            <div class="temp">${ow.main.temp_max.toFixed(0)}° / ${ow.main.temp_min.toFixed(0)}°</div>
            <p>${ow.weather[0].description} | 降水確率: ${ow.pop * 100}%</p>
          </div>
          <div class="icon">${getWeatherIcon(ow.weather[0].description)}</div>
        </div>
        <div class="card">
          <div class="card-info">
            <h3>WeatherAPI</h3>
            <div class="temp">${wa.day.maxtemp_c.toFixed(0)}° / ${wa.day.mintemp_c.toFixed(0)}°</div>
            <p>${wa.day.condition.text} | 降水確率: ${wa.day.daily_chance_of_rain}%</p>
          </div>
          <div class="icon">${getWeatherIcon(wa.day.condition.text)}</div>
        </div>`;
    }

    function renderWeek(open, weatherapi) {
      const grouped = {};
      open.list.forEach(item => { const date = item.dt_txt.split(" ")[0]; if (!grouped[date]) grouped[date] = []; grouped[date].push(item); });
      let html = "";
      weatherapi.forecast.forecastday.forEach((wa, i) => {
        const date = wa.date; const items = grouped[date] || [];
        const avgTemp = items.length ? (items.reduce((a, b) => a + b.main.temp, 0) / items.length).toFixed(1) : "-";
        const desc = items.length ? items[0].weather[0].description : "-";
        html += `
          <div class="card">
            <div class="card-info">
              <h3>${date}</h3>
              <p><strong>OpenWeather:</strong> ${desc} (${avgTemp}°)</p>
              <p><strong>WeatherAPI:</strong> ${wa.day.condition.text} (${wa.day.avgtemp_c}°)</p>
            </div>
            <div class="icon">${getWeatherIcon(desc)}</div>
          </div>`;
      });
      content.innerHTML = html;
    }
    loadWeather("today", currentLat, currentLon, currentCity);
    if ("serviceWorker" in navigator) { navigator.serviceWorker.register("service-worker.js"); }
  </script>
</body>
</html>
