<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天気比較アプリ</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; }
    header { background: #2c3e50; color: white; padding: 1.5rem; text-align: center; }
    header h1 { margin: 0 0 10px 0; font-size: 1.5rem; }
    .search-box { display: flex; justify-content: center; gap: 5px; }
    .search-box input { padding: 8px; border-radius: 4px; border: none; }
    .search-box button { padding: 8px 15px; border-radius: 4px; border: none; background: #3498db; color: white; cursor: pointer; }
    .tabs { display: flex; background: white; padding: 0.5rem; gap: 0.5rem; justify-content: center; }
    .tab { padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 20px; transition: all 0.3s; }
    .tab.active { background: #3498db; color: white; }
    .content { padding: 1rem; display: grid; gap: 1rem; max-width: 600px; margin: 0 auto; }
    .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card h3 { margin: 0 0 0.5rem 0; color: #7f8c8d; font-size: 0.9rem; }
    .card .temp { font-size: 1.5rem; font-weight: bold; }
    .footer { text-align: center; font-size: 0.7rem; color: #888; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>天気比較アプリ</h1>
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="都市名 (例: Okayama)" />
      <button onclick="searchCity()">検索</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-period="today">今日</div>
    <div class="tab" data-period="tomorrow">明日</div>
    <div class="tab" data-period="week">週間</div>
  </div>

  <div id="content" class="content">都市を入力して検索してください。</div>

  <div class="footer">Powered by OpenWeather & WeatherAPI</div>

  <script>
    const OPENWEATHER_KEY = "789f321d8b6cf36d45ac0ae811715656";
    const WEATHERAPI_KEY = "bbeada1be39e4803adc140054251410";
    let currentCity = "Okayama";
    let currentPeriod = "today";

    const tabs = document.querySelectorAll(".tab");
    const content = document.getElementById("content");

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentPeriod = tab.dataset.period;
        loadWeather(currentCity, currentPeriod);
      });
    });

    function searchCity() {
      const input = document.getElementById("cityInput").value;
      if (input) {
        currentCity = input;
        loadWeather(currentCity, currentPeriod);
      }
    }

    function getWeatherIcon(desc) {
      if (desc.includes("晴")) return "☀️";
      if (desc.includes("雷")) return "⛈️";
      if (desc.includes("雨")) return "🌧️";
      if (desc.includes("曇")) return "☁️";
      return "🌤️";
    }

    async function loadWeather(city, period) {
      content.textContent = "読み込み中...";
      try {
        // 都市名から緯度経度を取得 (WeatherAPIで代用可能)
        const geoRes = await fetch(`https://api.weatherapi.com/v1/search.json?key=${WEATHERAPI_KEY}&q=${city}`);
        const geoData = await geoRes.json();
        if (geoData.length === 0) throw new Error("都市が見つかりません");
        const { lat, lon } = geoData[0];

        const [openRes, weatherapiRes] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${OPENWEATHER_KEY}&units=metric&lang=ja`),
          fetch(`https://api.weatherapi.com/v1/forecast.json?key=${WEATHERAPI_KEY}&q=${city}&days=7&lang=ja`)
        ]);
        const openData = await openRes.json();
        const weatherapiData = await weatherapiRes.json();

        if (period === "week") renderWeek(openData, weatherapiData);
        else renderTodayTomorrow(openData, weatherapiData, period);
      } catch (e) { content.innerHTML = `<p style="color:red; text-align:center;">${e.message}</p>`; }
    }

    function renderTodayTomorrow(open, weatherapi, period) {
      const targetDay = period === "today" ? 0 : 1;
      const ow = open.list[targetDay * 8];
      const wa = weatherapi.forecast.forecastday[targetDay];
      content.innerHTML = `
        <div class="card"><h3>OpenWeather</h3><div class="temp">${ow.main.temp_max.toFixed(0)}° / ${ow.main.temp_min.toFixed(0)}°</div><p>${getWeatherIcon(ow.weather[0].description)} ${ow.weather[0].description} | 降水確率: ${ow.pop * 100}%</p></div>
        <div class="card"><h3>WeatherAPI</h3><div class="temp">${wa.day.maxtemp_c.toFixed(0)}° / ${wa.day.mintemp_c.toFixed(0)}°</div><p>${getWeatherIcon(wa.day.condition.text)} ${wa.day.condition.text} | 降水確率: ${wa.day.daily_chance_of_rain}%</p></div>`;
    }

    function renderWeek(open, weatherapi) {
      const grouped = {};
      open.list.forEach(item => { const date = item.dt_txt.split(" ")[0]; if (!grouped[date]) grouped[date] = []; grouped[date].push(item); });
      let html = "";
      weatherapi.forecast.forecastday.forEach((wa, i) => {
        const date = wa.date; const items = grouped[date] || [];
        const avgTemp = items.length ? (items.reduce((a, b) => a + b.main.temp, 0) / items.length).toFixed(1) : "-";
        const desc = items.length ? items[0].weather[0].description : "-";
        html += `<div class="card"><h3>${date}</h3><p><strong>OpenWeather:</strong> ${getWeatherIcon(desc)} ${desc} (${avgTemp}°)</p><p><strong>WeatherAPI:</strong> ${getWeatherIcon(wa.day.condition.text)} ${wa.day.condition.text} (${wa.day.avgtemp_c}°)</p></div>`;
      });
      content.innerHTML = html;
    }
  </script>
</body>
</html>
