<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天気比較</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; }
    header { background: #2c3e50; color: white; padding: 1.5rem; text-align: center; font-size: 1.5rem; font-weight: bold; }
    .search-box { display: flex; justify-content: center; gap: 0.5rem; margin-top: 10px; padding-bottom: 10px; }
    .tabs { display: flex; background: white; padding: 0.5rem; gap: 0.5rem; justify-content: center; }
    .tab { padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 20px; transition: all 0.3s; }
    .tab.active { background: #3498db; color: white; }
    .content { padding: 1rem; display: grid; gap: 1rem; max-width: 600px; margin: 0 auto; }
    .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card h3 { margin: 0 0 0.5rem 0; color: #7f8c8d; font-size: 0.9rem; }
    .card .temp { font-size: 1.5rem; font-weight: bold; }
    .footer { text-align: center; font-size: 0.7rem; color: #888; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <div>天気比較アプリ</div>
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="都市名を入力 (例: Tokyo)" />
      <button onclick="searchCity()">検索</button>
    </div>
  </header>
  <div class="tabs">
    <div class="tab active" data-period="today">今日</div>
    <div class="tab" data-period="tomorrow">明日</div>
    <div class="tab" data-period="week">週間</div>
  </div>
  <div id="content" class="content">位置情報を取得中...</div>
  <div class="footer">Powered by OpenWeather & WeatherAPI</div>
  <script>
    const OPENWEATHER_KEY = "789f321d8b6cf36d45ac0ae811715656";
    const WEATHERAPI_KEY = "bbeada1be39e4803adc140054251410";
    let curLat = 34.655, curLon = 133.919, curPeriod = "today";
    
    const tabs = document.querySelectorAll(".tab");
    tabs.forEach(t => t.addEventListener("click", (e) => {
      tabs.forEach(tab => tab.classList.remove("active"));
      e.target.classList.add("active");
      curPeriod = e.target.dataset.period;
      loadWeather();
    }));

    async function loadWeather() {
      document.getElementById("content").textContent = "読み込み中...";
      try {
        const [o, w] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${curLat}&lon=${curLon}&appid=${OPENWEATHER_KEY}&units=metric&lang=ja`).then(r=>r.json()),
          fetch(`https://api.weatherapi.com/v1/forecast.json?key=${WEATHERAPI_KEY}&q=${curLat},${curLon}&days=7&lang=ja`).then(r=>r.json())
        ]);
        curPeriod === "week" ? renderWeek(o, w) : renderTodayTomorrow(o, w, curPeriod);
      } catch (e) { document.getElementById("content").innerHTML = "取得失敗"; }
    }

    function searchCity() {
      const city = document.getElementById("cityInput").value;
      if(!city) return;
      fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${city}&appid=${OPENWEATHER_KEY}`)
        .then(r => r.json()).then(d => {
          if(d.length){ curLat = d[0].lat; curLon = d[0].lon; loadWeather(); }
        });
    }

    function getIcon(desc) {
      if(desc.includes("晴")) return "☀️"; if(desc.includes("雷")) return "⛈️";
      if(desc.includes("雨")) return "🌧️"; if(desc.includes("曇")) return "☁️";
      return "🌤️";
    }

    function renderTodayTomorrow(o, w, period) {
      const idx = period === "today" ? 0 : 1;
      const ow = o.list[idx * 8];
      const wa = w.forecast.forecastday[idx];
      document.getElementById("content").innerHTML = `
        <div class="card"><h3>OpenWeather</h3><div class="temp">${ow.main.temp_max.toFixed(0)}° / ${ow.main.temp_min.toFixed(0)}°</div><p>${getIcon(ow.weather[0].description)} ${ow.weather[0].description}</p></div>
        <div class="card"><h3>WeatherAPI</h3><div class="temp">${wa.day.maxtemp_c.toFixed(0)}° / ${wa.day.mintemp_c.toFixed(0)}°</div><p>${getIcon(wa.day.condition.text)} ${wa.day.condition.text}</p></div>`;
    }

    function renderWeek(o, w) {
      const grp = {}; o.list.forEach(i => { const d = i.dt_txt.split(" ")[0]; if(!grp[d]) grp[d] = []; grp[d].push(i); });
      let h = "";
      w.forecast.forecastday.forEach(wa => {
        const d = wa.date, items = grp[d] || [];
        h += `<div class="card"><h3>${d}</h3><p>OW: ${items.length ? getIcon(items[0].weather[0].description) + items[0].weather[0].description : "-"}</p><p>WA: ${wa.day.condition.text}</p></div>`;
      });
      document.getElementById("content").innerHTML = h;
    }

    navigator.geolocation.getCurrentPosition(p => { curLat = p.coords.latitude; curLon = p.coords.longitude; loadWeather(); }, loadWeather);
  </script>
</body>
</html>
