<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岡山市の天気比較</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0077b6">
<style>
  body { font-family: sans-serif; background: #f7f7f7; margin: 0; }
  header { background: #0077b6; color: white; text-align: center; padding: 1rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: white; }
  th, td { padding: 0.6rem; border-bottom: 1px solid #ddd; text-align: center; }
  th { background: #f0f0f0; }
  .tabs { display: flex; }
  .tab { flex: 1; text-align: center; padding: 0.8rem; cursor: pointer; background: #e9ecef; }
  .tab.active { background: white; border-bottom: 2px solid #0077b6; }
  footer { text-align: center; font-size: 0.8rem; color: #666; margin: 1rem; }
</style>
</head>
<body>

<header>
  <h1>岡山市の天気比較</h1>
  <p id="update-time">更新中...</p>
</header>

<div class="tabs">
  <div class="tab active" data-tab="today">今日</div>
  <div class="tab" data-tab="week">週間</div>
</div>

<div id="today" class="content">
  <table>
    <tr><th>サイト</th><th>天気</th><th>気温</th><th>降水</th></tr>
    <tr><td>OpenWeather</td><td id="ow-weather">-</td><td id="ow-temp">-</td><td id="ow-pop">-</td></tr>
    <tr><td>気象庁</td><td id="jma-weather">-</td><td id="jma-temp">-</td><td id="jma-pop">-</td></tr>
    <tr><td>MET Norway</td><td id="met-weather">-</td><td id="met-temp">-</td><td id="met-pop">-</td></tr>
  </table>
</div>

<div id="week" class="content" style="display:none;">
  <p style="text-align:center;margin-top:1rem;">週間予報（準備中）</p>
</div>

<footer>
  <p>© 2025 天気比較データ | OpenWeather / 気象庁 / MET Norway</p>
</footer>

<script>
const apiKey = "789f321d8b6cf36d45ac0ae811715656"; // ← あなたのAPIキーをここに

// 更新時刻
const now = new Date();
document.getElementById("update-time").textContent = now.toLocaleString("ja-JP") + " 更新";

// --- OpenWeather ---
fetch(`https://api.openweathermap.org/data/2.5/weather?q=okayama,jp&appid=${apiKey}&lang=ja&units=metric`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("ow-weather").textContent = data.weather[0].description;
    document.getElementById("ow-temp").textContent = `${data.main.temp}℃`;
    document.getElementById("ow-pop").textContent = (data.rain?.["1h"] || 0) + "mm";
  });

// --- 気象庁 ---
fetch("https://www.jma.go.jp/bosai/forecast/data/forecast/330000.json")
  .then(res => res.json())
  .then(data => {
    const area = data[0].timeSeries[0];
    document.getElementById("jma-weather").textContent = area.areas[0].weathers[0];
    document.getElementById("jma-temp").textContent = "-";
    document.getElementById("jma-pop").textContent = area.areas[0].pops[0] + "%";
  });

// --- MET Norway ---
fetch("https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=34.655&lon=133.919")
  .then(res => res.json())
  .then(data => {
    const t = data.properties.timeseries[0];
    document.getElementById("met-weather").textContent = t.data.next_1_hours.summary.symbol_code;
    document.getElementById("met-temp").textContent = t.data.instant.details.air_temperature + "℃";
    document.getElementById("met-pop").textContent = (t.data.next_1_hours.details.precipitation_amount || 0) + "mm";
  });

// --- タブ切替 ---
const tabs = document.querySelectorAll('.tab');
const contents = document.querySelectorAll('.content');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    contents.forEach(c => c.style.display = 'none');
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).style.display = 'block';
  });
});

// --- Service Worker登録 ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
  .then(() => console.log("✅ Service Worker registered"))
  .catch(err => console.log("SW registration failed", err));
}
</script>
</body>
</html>
