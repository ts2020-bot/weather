<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天気比較アプリ</title>
  <style>
    :root { --bg: #f0f2f5; --card: #ffffff; --text: #333; --accent: #3498db; --header: #2c3e50; }
    [data-theme='dark'] { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #3498db; --header: #000000; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s, color 0.3s; }
    header { background: var(--header); color: white; padding: 1.5rem; text-align: center; }
    .search-box { display: flex; justify-content: center; gap: 0.5rem; margin-top: 10px; }
    .tabs { display: flex; background: var(--card); padding: 0.5rem; gap: 0.5rem; justify-content: center; border-bottom: 1px solid #ccc; }
    .tab { padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 20px; transition: all 0.3s; }
    .tab.active { background: var(--accent); color: white; }
    .content { padding: 1rem; display: grid; gap: 1rem; max-width: 600px; margin: 0 auto; }
    .card { background: var(--card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .theme-toggle { position: absolute; top: 1rem; right: 1rem; cursor: pointer; background: none; border: 1px solid white; color: white; border-radius: 5px; padding: 5px; }
  </style>
</head>
<body>
  <header>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <div>天気比較アプリ</div>
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="都市名を入力" />
      <button onclick="searchCity()">検索</button>
    </div>
  </header>
  <div class="tabs">
    <div class="tab active" data-period="today">今日</div>
    <div class="tab" data-period="tomorrow">明日</div>
    <div class="tab" data-period="week">週間</div>
  </div>
  <div id="content" class="content">読み込み中...</div>
  <script>
    const OPENWEATHER_KEY = "789f321d8b6cf36d45ac0ae811715656";
    const WEATHERAPI_KEY="bbeada1be39e4803adc140054251410";
    let currentLat = 34.655, currentLon = 133.919, currentName = "岡山市";

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    async function loadWeather(period = "today") {
      try {
        const [openRes, weatherapiRes] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${currentLat}&lon=${currentLon}&appid=${OPENWEATHER_KEY}&units=metric&lang=ja`),
          fetch(`https://api.weatherapi.com/v1/forecast.json?key=${WEATHERAPI_KEY}&q=${currentLat},${currentLon}&days=7&lang=ja`)
        ]);
        const openData = await openRes.json();
        const weatherapiData = await weatherapiRes.json();
        document.querySelector('header div').textContent = currentName + " 天気比較";
        if (period === "week") renderWeek(openData, weatherapiData);
        else renderTodayTomorrow(openData, weatherapiData, period);
      } catch (e) { content.innerHTML = "取得失敗"; }
    }

    function searchCity() {
      const city = document.getElementById("cityInput").value.trim();
      fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${city},JP&limit=5&appid=${OPENWEATHER_KEY}`)
        .then(res => res.json())
        .then(data => {
          const match = data.find(i => i.local_names?.ja === city || i.local_names?.ja === city + "市" || i.name === city);
          if (match) { currentLat = match.lat; currentLon = match.lon; currentName = match.local_names?.ja || match.name; loadWeather(); }
          else alert("地名が見つかりません");
        });
    }

    function renderTodayTomorrow(open, weatherapi, period) {
      const idx = period === "today" ? 0 : 1;
      const ow = open.list[idx * 8];
      const wa = weatherapi.forecast.forecastday[idx];
      content.innerHTML = `
        <div class="card"><h3>OpenWeather</h3><div class="temp">${ow.main.temp_max.toFixed(0)}° / ${ow.main.temp_min.toFixed(0)}°</div><p>${ow.weather[0].description}</p></div>
        <div class="card"><h3>WeatherAPI</h3><div class="temp">${wa.day.maxtemp_c.toFixed(0)}° / ${wa.day.mintemp_c.toFixed(0)}°</div><p>${wa.day.condition.text}</p></div>`;
    }

    function renderWeek(open, weatherapi) {
      content.innerHTML = weatherapi.forecast.forecastday.map(wa => `
        <div class="card"><h3>${wa.date}</h3><p>WeatherAPI: ${wa.day.condition.text} (${wa.day.avgtemp_c}°)</p></div>`).join('');
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", (e) => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        e.target.classList.add("active");
        loadWeather(e.target.dataset.period);
      });
    });

    navigator.geolocation.getCurrentPosition(pos => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; currentName = "現在地"; loadWeather(); }, () => loadWeather());
  </script>
</body>
</html>
