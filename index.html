<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天気比較アプリ</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; }
    header { background: #2c3e50; color: white; padding: 1.5rem; text-align: center; }
    .search-box { display: flex; justify-content: center; gap: 0.5rem; margin-top: 10px; }
    .tabs { display: flex; background: white; padding: 0.5rem; gap: 0.5rem; justify-content: center; }
    .tab { padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 20px; transition: all 0.3s; }
    .tab.active { background: #3498db; color: white; }
    .content { padding: 1rem; display: grid; gap: 1rem; max-width: 600px; margin: 0 auto; }
    .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card h3 { margin: 0 0 0.5rem 0; color: #7f8c8d; font-size: 0.9rem; }
    .card .temp { font-size: 1.5rem; font-weight: bold; }
  </style>
</head>
<body>
  <header>
    <div>天気比較アプリ</div>
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="都市名を入力" />
      <button onclick="searchCity()">検索</button>
    </div>
  </header>
  <div class="tabs">
    <div class="tab active" data-period="today">今日</div>
    <div class="tab" data-period="tomorrow">明日</div>
    <div class="tab" data-period="week">週間</div>
  </div>
  <div id="content" class="content">位置情報または都市を検索してください...</div>
  <script>
    const OPENWEATHER_KEY = "789f321d8b6cf36d45ac0ae811715656";
    const WEATHERAPI_KEY="bbeada1be39e4803adc140054251410";
    let currentLat = 34.655, currentLon = 133.919, currentName = "岡山市";

    async function loadWeather(period = "today") {
      content.textContent = "読み込み中...";
      try {
        const [openRes, weatherapiRes] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${currentLat}&lon=${currentLon}&appid=${OPENWEATHER_KEY}&units=metric&lang=ja`),
          fetch(`https://api.weatherapi.com/v1/forecast.json?key=${WEATHERAPI_KEY}&q=${currentLat},${currentLon}&days=7&lang=ja`)
        ]);
        const openData = await openRes.json();
        const weatherapiData = await weatherapiRes.json();
        
        document.querySelector('header div').textContent = currentName + " 天気比較";
        if (period === "week") renderWeek(openData, weatherapiData);
        else renderTodayTomorrow(openData, weatherapiData, period);
      } catch (e) { content.innerHTML = "データ取得失敗"; }
    }

    function searchCity() {
      const city = document.getElementById("cityInput").value.trim();
      if (!city) return;
      fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${city},JP&limit=5&appid=${OPENWEATHER_KEY}`)
        .then(res => res.json())
        .then(data => {
          const match = data.find(i => 
             i.local_names?.ja === city || 
             i.local_names?.ja === city + "市" || 
             i.name === city
          );
          if (match) {
            currentLat = match.lat; currentLon = match.lon;
            currentName = match.local_names?.ja || match.name;
            loadWeather();
          } else alert("「" + city + "」という地名が見つかりませんでした。市町村名を正確に入力してください。");
        });
    }

    function renderTodayTomorrow(open, weatherapi, period) {
      const idx = period === "today" ? 0 : 1;
      const ow = open.list[idx * 8];
      const wa = weatherapi.forecast.forecastday[idx];
      content.innerHTML = `
        <div class="card"><h3>OpenWeather</h3><div class="temp">${ow.main.temp_max.toFixed(0)}° / ${ow.main.temp_min.toFixed(0)}°</div><p>${ow.weather[0].description}</p></div>
        <div class="card"><h3>WeatherAPI</h3><div class="temp">${wa.day.maxtemp_c.toFixed(0)}° / ${wa.day.mintemp_c.toFixed(0)}°</div><p>${wa.day.condition.text}</p></div>`;
    }

    function renderWeek(open, weatherapi) {
      let html = "";
      weatherapi.forecast.forecastday.forEach((wa, i) => {
        html += `<div class="card"><h3>${wa.date}</h3><p>WeatherAPI: ${wa.day.condition.text} (${wa.day.avgtemp_c}°)</p></div>`;
      });
      content.innerHTML = html;
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", (e) => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        e.target.classList.add("active");
        loadWeather(e.target.dataset.period);
      });
    });

    navigator.geolocation.getCurrentPosition(
      pos => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; currentName = "現在地"; loadWeather(); },
      () => loadWeather()
    );
  </script>
</body>
</html>
