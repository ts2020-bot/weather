<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>岡山市 天気比較</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    body {
      font-family: "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f6f8fa;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background: #3498db;
      color: white;
      padding: 1rem;
      font-size: 1.4rem;
    }
    .tabs {
      display: flex;
      justify-content: space-around;
      background: #e0e0e0;
    }
    .tab {
      flex: 1;
      padding: 0.8rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      border-bottom: 3px solid #3498db;
      background: #fff;
    }
    .content {
      padding: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 0.5rem;
      font-size: 0.9rem;
    }
    th {
      background: #f0f0f0;
    }
    .footer {
      font-size: 0.7rem;
      color: #888;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <header>岡山市 天気比較</header>

  <div class="tabs">
    <div class="tab active" data-period="today">今日</div>
    <div class="tab" data-period="tomorrow">明日</div>
    <div class="tab" data-period="week">週間</div>
  </div>

  <div id="content" class="content">読み込み中...</div>

  <div class="footer">
    Powered by OpenWeather & WeatherAPI<br />
    PWA対応版 by ChatGPT
  </div>

  <script>
    const OPENWEATHER_KEY = "789f321d8b6cf36d45ac0ae811715656";
    const WEATHERAPI_KEY = "bbeada1be39e4803adc140054251410";

    const lat = 34.655;
    const lon = 133.919;
    const city = "Okayama";

    const tabs = document.querySelectorAll(".tab");
    const content = document.getElementById("content");

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        loadWeather(tab.dataset.period);
      });
    });

    async function loadWeather(period) {
      content.textContent = "読み込み中...";

      try {
        const [openRes, weatherapiRes] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${OPENWEATHER_KEY}&units=metric&lang=ja`),
          fetch(`https://api.weatherapi.com/v1/forecast.json?key=${WEATHERAPI_KEY}&q=${city}&days=7&lang=ja`)
        ]);

        const openData = await openRes.json();
        const weatherapiData = await weatherapiRes.json();

        if (period === "week") {
          renderWeek(openData, weatherapiData);
        } else {
          renderTodayTomorrow(openData, weatherapiData, period);
        }
      } catch (e) {
        content.innerHTML = `<p style="color:red;">データ取得に失敗しました。</p>`;
      }
    }

    function renderTodayTomorrow(open, weatherapi, period) {
      const targetDay = period === "today" ? 0 : 1;
      const owItem = open.list[targetDay * 8]; // 3h × 8 = 1日
      const waItem = weatherapi.forecast.forecastday[targetDay];

      content.innerHTML = `
        <table>
          <tr><th>サイト</th><th>天気</th><th>最高/最低</th><th>降水確率</th></tr>
          <tr><td>OpenWeather</td><td>${owItem.weather[0].description}</td><td>${owItem.main.temp_max?.toFixed(1)}° / ${owItem.main.temp_min?.toFixed(1)}°</td><td>${owItem.pop * 100}%</td></tr>
          <tr><td>WeatherAPI</td><td>${waItem.day.condition.text}</td><td>${waItem.day.maxtemp_c}° / ${waItem.day.mintemp_c}°</td><td>${waItem.day.daily_chance_of_rain}%</td></tr>
        </table>`;
    }

    function renderWeek(open, weatherapi) {
      const owDays = [];
      const grouped = {};
      open.list.forEach(item => {
        const date = item.dt_txt.split(" ")[0];
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(item);
      });
      for (const [date, items] of Object.entries(grouped)) {
        const temps = items.map(i => i.main.temp);
        const avg = temps.reduce((a, b) => a + b, 0) / temps.length;
        const weather = items[0].weather[0].description;
        owDays.push({ date, temp: avg.toFixed(1), weather });
      }

      const waDays = weatherapi.forecast.forecastday;

      let html = `
        <table>
          <tr><th>日付</th><th>OpenWeather</th><th>WeatherAPI</th></tr>
      `;
      waDays.forEach((wa, i) => {
        const ow = owDays[i];
        html += `
          <tr>
            <td>${wa.date}</td>
            <td>${ow ? `${ow.weather} (${ow.temp}°)` : "-"}</td>
            <td>${wa.day.condition.text} (${wa.day.avgtemp_c}°)</td>
          </tr>`;
      });
      html += `</table>`;
      content.innerHTML = html;
    }

    // 初回ロード
    loadWeather("today");

    // PWA登録
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
